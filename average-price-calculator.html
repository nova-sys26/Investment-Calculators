<!DOCTYPE html>
<html>

<head>
<title>Average Price Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:8px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.menu{
margin-bottom:25px;
}

.menu a{
color:#3b82f6;
margin:10px;
text-decoration:none;
}

</style>


</head>

<body>

<h1>Average Price Calculator</h1>

<div class="calculator">

<div id="buys"></div>

<button onclick="addBuy()">Add Buy</button>

<br>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>

</div>

<script>

function addBuy(){

let div=document.createElement("div");

div.className="buy-row";

div.innerHTML=`
<input class="price" placeholder="Price">
<input class="amount" placeholder="Amount">
<button class="remove" onclick="removeBuy(this)">Remove</button>
`;

document.getElementById("buys").appendChild(div);

}

function removeBuy(button){

button.parentElement.remove();

}

function calculate(){

let prices=document.querySelectorAll(".price");
let amounts=document.querySelectorAll(".amount");

let totalCost=0;
let totalAmount=0;

for(let i=0;i<prices.length;i++){

let p=parseFloat(prices[i].value);
let a=parseFloat(amounts[i].value);

if(!isNaN(p) && !isNaN(a)){
totalCost+=p*a;
totalAmount+=a;
}

}

if(totalAmount===0){
document.getElementById("result").innerText="Enter values";
return;
}

let avg=totalCost/totalAmount;

document.getElementById("result").innerText="Average price: "+avg;

}

addBuy();
addBuy();

</script>

</body>
</html>
