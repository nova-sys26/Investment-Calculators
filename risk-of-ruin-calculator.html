<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Risk of Ruin Calculator – Trading Survival Tool</title>
<meta name="description" content="Calculate your risk of ruin based on win rate, risk per trade, and reward ratio. Understand your trading survival probability.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
min-height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:16px;
width:90%;
max-width:500px;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

input{
width:100%;
padding:14px;
margin:12px 0;
border-radius:10px;
border:none;
background:#e5e7eb;
font-size:16px;
}

button{
padding:14px;
background:#3b82f6;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:10px;
width:100%;
}

canvas{
margin-top:25px;
}
</style>

</head>

<body>

<div class="container">

<h1>Risk of Ruin Calculator</h1>

<input id="winRate" placeholder="Win Rate (%)">
<input id="risk" placeholder="Risk per Trade (%)">
<input id="reward" placeholder="Reward / Risk Ratio (e.g. 2)">
<input id="trades" placeholder="Number of Trades">

<button onclick="calculateRuin()">Calculate</button>

<h3 id="result"></h3>

<canvas id="ruinChart"></canvas>
<canvas id="equityChart"></canvas>

</div>

<script>

let ruinChart;
let equityChart;

function calculateRuin(){

let winRate = parseFloat(document.getElementById("winRate").value) / 100;
let risk = parseFloat(document.getElementById("risk").value) / 100;
let reward = parseFloat(document.getElementById("reward").value);
let trades = parseInt(document.getElementById("trades").value);

if(isNaN(winRate) || isNaN(risk) || isNaN(reward) || isNaN(trades)){
  alert("Fill all fields");
  return;
}

// 🔥 MONTE CARLO
let simulations = 500;
let ruinCount = 0;

for(let s=0; s<simulations; s++){

  let balance = 100;

  for(let i=0; i<trades; i++){

    let tradeRisk = balance * risk;

    if(Math.random() < winRate){
      balance += tradeRisk * reward;
    }else{
      balance -= tradeRisk;
    }

    if(balance <= 10){
      ruinCount++;
      break;
    }
  }
}

let percent = (ruinCount / simulations) * 100;

// 🎯 YORUM
let extra = "";

if(percent > 70){
  extra = " 🚨 Very high risk";
}else if(percent > 40){
  extra = " ⚠️ Risky";
}else{
  extra = " ✅ Sustainable";
}

document.getElementById("result").innerHTML =
"Risk of Ruin: " + percent.toFixed(2) + "%" + extra;

// chartlar
drawRuinChart(percent);
drawEquity(winRate, risk, reward, trades);
}

// DONUT
function drawRuinChart(percent){

let ctx = document.getElementById("ruinChart");

if(ruinChart) ruinChart.destroy();

ruinChart = new Chart(ctx,{
type:'doughnut',
data:{
labels:["Survival","Ruin"],
datasets:[{
data:[100-percent, percent],
backgroundColor:["#22c55e","#ef4444"]
}]
}
});
}

// EQUITY
function drawEquity(winRate, risk, reward, trades){

let ctx = document.getElementById("equityChart");

if(equityChart) equityChart.destroy();

let balance = 100;
let data = [balance];

for(let i=0;i<trades;i++){

let tradeRisk = balance * risk;

if(Math.random() < winRate){
  balance += tradeRisk * reward;
}else{
  balance -= tradeRisk;
}

data.push(balance);
}

equityChart = new Chart(ctx,{
type:'line',
data:{
labels: data.map((_,i)=>i),
datasets:[{
label:"Equity Curve",
data:data,
borderColor:"#3b82f6",
tension:0.3
}]
}
});
}

</script>

</body>
</html>
