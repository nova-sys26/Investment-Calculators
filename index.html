<!DOCTYPE html>
<html>
<head>
<title>Investment Calculators</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family: Arial;
background: radial-gradient(circle at top, #0f172a, #020617);
color:white;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
  }

h1{
margin-bottom:30px;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
margin:auto;
}

a{
display:block;
margin:15px;
padding:12px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:6px;
}

a:hover{
background:#2563eb;
}

.hero{
text-align:center;
margin:30px 20px 10px;
}

.hero h1{
font-size:36px;
background: linear-gradient(90deg,#3b82f6,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
color:#9ca3af;
font-size:15px;
}

.hero p{
color:#9ca3af;
}

/* GRID */
.grid{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
gap:25px;
width:90%;
max-width:1100px;
margin-bottom:60px;
  }

/* CARD */
.card{
background: rgba(30,41,59,0.6);
backdrop-filter: blur(10px);
padding:16px;
border-radius:16px;
text-align:center;
transition:0.3s;
border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,0.5);
border:1px solid rgba(59,130,246,0.4);
  }

/* BUTTON */
.card a{
display:inline-block;
padding:10px 18px;
background: linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
border-radius:10px;
text-decoration:none;
transition:0.2s;
}

.card a:hover{
transform:scale(1.05);
  }

#search{
width:90%;
max-width:400px;
padding:12px;
margin:20px 0;
border-radius:10px;
border:none;
outline:none;
font-size:14px;
background:#1e293b;
color:white;
  }
</style>

</head>

<body>
<div class="hero">
  <h1>Trading Calculators</h1>
  <p>Simple tools to manage risk, profit and strategy</p>

<input type="text" id="search" placeholder="Search calculator..." onkeyup="searchTools()">
</div>

<div class="grid">

  <div class="card tool">
    <h3>Position Size</h3>
    <p>Manage your risk per trade</p>
    <a href="position-size-calculator.html">Open</a>
  </div>

  <div class="card tool">
    <h3>Profit / Loss</h3>
    <p>Calculate your trade outcome</p>
    <a href="profit-loss-calculator.html">Open</a>
  </div>

  <div class="card tool">
    <h3>DCA Calculator</h3>
    <p>Average your entry price</p>
    <a href="dca-calculator.html">Open</a>
  </div>

  <div class="card tool">
    <h3>Break Even</h3>
    <p>Recover from losses</p>
    <a href="break-even-calculator.html">Open</a>
  </div>

</div>
<p id="noResult" style="display:none;">No calculator found</p>
  
<script>
function searchTools(){

let input = document.getElementById("search").value.toLowerCase()
let cards = document.querySelectorAll(".tool")

  let visible = 0

cards.forEach(card => {
let text = card.innerText.toLowerCase()

if(text.includes(input)){
card.style.display = "block"
visible++
} else {
card.style.display = "none"
}
})

document.getElementById("noResult").style.display =
visible === 0 ? "block" : "none"

  }
<script>

</body>
</html>
