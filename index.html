<!DOCTYPE html>
<html>
<head>
<title>Investment Calculators</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Investment Calculators</h1>

<h2>Average Price Calculator</h2>
<div id="buys"></div>

<button onclick="addBuy()">Add Buy</button>

<br><br>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>
<input id="price1" placeholder="First buy price">
<input id="amount1" placeholder="First amount">

<br><br>

<input id="price2" placeholder="Second buy price">
<input id="amount2" placeholder="Second amount">

<br><br>

<button onclick="calc()">Calculate</button>

<p id="result"></p>

<script>
function calc()function addBuy(){

let div=document.createElement("div");

div.innerHTML=`
<input class="price" placeholder="Price">
<input class="amount" placeholder="Amount">
`;

document.getElementById("buys").appendChild(div);

}

function calculate(){

let prices=document.querySelectorAll(".price");
let amounts=document.querySelectorAll(".amount");

let totalCost=0;
let totalAmount=0;

for(let i=0;i<prices.length;i++){

let p=parseFloat(prices[i].value);
let a=parseFloat(amounts[i].value);

if(!isNaN(p) && !isNaN(a)){
totalCost+=p*a;
totalAmount+=a;
}

}

let avg=totalCost/totalAmount;

document.getElementById("result").innerText="Average price: "+avg;

}

addBuy();
addBuy();

let p1=parseFloat(document.getElementById("price1").value);
let a1=parseFloat(document.getElementById("amount1").value);

let p2=parseFloat(document.getElementById("price2").value);
let a2=parseFloat(document.getElementById("amount2").value);

let avg=((p1*a1)+(p2*a2))/(a1+a2);

document.getElementById("result").innerText="Average price: "+avg;

}
</script>

</body>
</html>
