<!DOCTYPE html>
<html>
<head>
<title>Investment Calculators</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family: Arial;
background: radial-gradient(circle at top, #0f172a, #020617);
color:white;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
  }

h1{
margin-bottom:30px;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
margin:auto;
}

a{
display:block;
margin:15px;
padding:12px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:6px;
}

a:hover{
background:#2563eb;
}

.hero{
text-align:center;
margin:60px 20px 30px;
}

.hero h1{
font-size:36px;
background: linear-gradient(90deg,#3b82f6,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
color:#9ca3af;
font-size:15px;
}

.hero p{
color:#9ca3af;
}
<p style="color:#6b7a99;font-size:13px;">
10+ free tools • No signup • Instant results
</p>
/* GRID */
.grid{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
gap:25px;
width:90%;
max-width:1000px;
margin-bottom:60px;
  }

/* CARD */
.card{
background: rgba(30,41,59,0.6);
backdrop-filter: blur(10px);
padding:20px;
border-radius:16px;
text-align:center;
transition:0.3s;
border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,0.5);
border:1px solid rgba(59,130,246,0.4);
  }

/* BUTTON */
.card a{
display:inline-block;
padding:10px 18px;
background: linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
border-radius:10px;
text-decoration:none;
transition:0.2s;
}

.card a:hover{
transform:scale(1.05);
  }
</style>

</head>

<body>
<div class="hero">
  <h1>Trading Calculators</h1>
  <p>Simple tools to manage risk, profit and strategy</p>
</div>

<div class="grid">

  <div class="card">
    <h3>Position Size</h3>
    <p>Manage your risk per trade</p>
    <a href="position.html">Open</a>
  </div>

  <div class="card">
    <h3>Profit / Loss</h3>
    <p>Calculate your trade outcome</p>
    <a href="profit.html">Open</a>
  </div>

  <div class="card">
    <h3>DCA Calculator</h3>
    <p>Average your entry price</p>
    <a href="dca.html">Open</a>
  </div>

  <div class="card">
    <h3>Break Even</h3>
    <p>Recover from losses</p>
    <a href="breakeven.html">Open</a>
  </div>

</div>

</body>
</html>
