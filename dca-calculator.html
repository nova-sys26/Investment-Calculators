<!DOCTYPE html>
<html>
<head>
<title>DCA Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:8px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.menu{
margin-bottom:25px;
}

.menu a{
color:#3b82f6;
margin:10px;
text-decoration:none;
}

</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="menu">
<a href="index.html">Home</a>
<a href="average-price-calculator.html">Average Price</a>
</div>

<h1>DCA Calculator</h1>

<div class="container">

<input id="investment" placeholder="Investment per period ($)">

<input id="price" placeholder="Average buy price">

<input id="finalprice" placeholder="Current price">

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>
<canvas id="myChart"></canvas>
</div>

<script>

function calculate(){

let investment = parseFloat(document.getElementById("investment").value)
let price = parseFloat(document.getElementById("price").value)
let finalprice = parseFloat(document.getElementById("finalprice").value)

let coins = investment / price

let value = coins * finalprice

let profit = value - investment

document.getElementById("result").innerHTML =
"Coins bought: " + coins.toFixed(4) +
"<br>Current value: $" + value.toFixed(2) +
"<br>Profit/Loss: $" + profit.toFixed(2)

}

</script>

</body>
</html>
