<!DOCTYPE html>
<html>

<head>

<title>Profit Loss Calculator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#0b1a33;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
flex-direction:column;
}

.container{
background:#1e293b;
padding:30px;
border-radius:12px;
width:90%;
max-width:500px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

canvas{
margin-top:30px;
}
.menu{
margin-bottom:25px;
}

.menu a{
color:#3b82f6;
margin:10px;
text-decoration:none;
}
</style>

</head>

<body>
  
<div class="menu">
<a href="index.html">Home</a>
</div>
  
<h1>Profit / Loss Calculator</h1>

<div class="container">

<input id="buy" placeholder="Buy price ($)">
<input id="sell" placeholder="Sell price ($)">
<input id="amount" placeholder="Asset amount">

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<canvas id="myChart"></canvas>

</div>

<script>

let chart;

function calculate(){

let buy = parseFloat(document.getElementById("buy").value)
let sell = parseFloat(document.getElementById("sell").value)
let amount = parseFloat(document.getElementById("amount").value)

let investment = buy * amount
let value = sell * amount
let profit = value - investment

document.getElementById("result").innerHTML =
"Profit / Loss: $" + profit.toFixed(2)

drawChart(investment,value)

}

function drawChart(investment,value){

let ctx = document.getElementById('myChart')

if(chart){
chart.destroy()
}

chart = new Chart(ctx,{
type:'bar',
data:{
labels:['Investment','Final Value'],
datasets:[{
label:'Portfolio',
data:[investment,value]
}]
}
})

}

</script>

</body>

</html>
