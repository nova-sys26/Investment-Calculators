<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Stop Loss Calculator – Manage Your Trading Risk</title>
<meta name="description" content="Calculate your stop loss level easily. Manage risk and protect your capital in trading.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
min-height:100vh;
     }
.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:8px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.menu{
margin-bottom:25px;
}

.menu a{
color:#3b82f6;
margin:10px;
text-decoration:none;
}
.toptext{
font-size:14px;
color:#6b7a99;
margin-bottom:5px;
  }
.disclaimer{
margin-top:40px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,0.1);
font-size:13px;
color:#9ca3af;
max-width:500px;
text-align:center;
line-height:1.6;
  }
</style>

</head>

<body>

<p class="toptext">Explore more calculators</p> 

<div class="menu">
<a href="index.html">Home</a>
</div>

<h1>Stop Loss Calculator</h1>

<div class="container">

<input id="entry" placeholder="Entry price">
<input id="risk" placeholder="Risk % (e.g. 2)">
<input id="type" placeholder="Type (long/short)">

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<canvas id="myChart"></canvas>

</div>

<script>

let chart;

function calculate(){

let entry = parseFloat(document.getElementById("entry").value)
let risk = parseFloat(document.getElementById("risk").value)
let type = document.getElementById("type").value.toLowerCase()

if(!entry || !risk || !type){
alert("Fill all fields")
return
}

let stopLoss;

if(type === "long"){
stopLoss = entry * (1 - risk/100)
} else if(type === "short"){
stopLoss = entry * (1 + risk/100)
} else {
alert("Type must be long or short")
return
}

document.getElementById("result").innerHTML =
`Stop Loss Price: $${stopLoss.toFixed(2)}`

drawChart(entry, stopLoss)

}

function drawChart(entry, stopLoss){

let ctx = document.getElementById('myChart')

if(chart){
chart.destroy()
}

chart = new Chart(ctx,{
type:'bar',
data:{
labels:['Entry Price','Stop Loss'],
datasets:[{
label:'Trade Levels',
data:[entry, stopLoss],
backgroundColor:['#22c55e','#ef4444']
}]
}
})

}

</script>

</body>
