<!DOCTYPE html>
<html>
<head>

<title>Position Size Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#0b1a33;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
flex-direction:column;
}

.container{
background:#1e293b;
padding:30px;
border-radius:12px;
width:90%;
max-width:500px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

canvas{
margin-top:30px;
}

</style>
</head>

<body>

<h1>Position Size Calculator</h1>

<div class="container">

<input id="balance" placeholder="Account balance ($)">
<input id="risk" placeholder="Risk per trade (%)">
<input id="stop" placeholder="Stop loss (%)">

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<canvas id="myChart"></canvas>

</div>

<script>

let chart;

function calculate(){

let balance=parseFloat(document.getElementById("balance").value)
let risk=parseFloat(document.getElementById("risk").value)/100
let stop=parseFloat(document.getElementById("stop").value)/100

let riskAmount=balance*risk
let position=riskAmount/stop

document.getElementById("result").innerHTML=
"Position Size: $" + position.toFixed(2)

drawChart(riskAmount,position)

}

function drawChart(riskAmount,position){

let ctx=document.getElementById('myChart')

if(chart){chart.destroy()}

chart=new Chart(ctx,{
type:'bar',
data:{
labels:['Risk Amount','Position Size'],
datasets:[{
label:'Trade',
data:[riskAmount,position]
}]
}
})

}

</script>

</body>
  </html>
