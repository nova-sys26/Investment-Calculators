<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Position Size Calculator – Manage Your Risk</title>
<meta name="description" content="Calculate the perfect position size based on risk and account balance. Essential tool for traders.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
background:#0b1a33;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
flex-direction:column;
}

.container{
background:#1e293b;
padding:30px;
border-radius:12px;
width:90%;
max-width:500px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

canvas{
margin-top:30px;
}

.menu a{
color:#3b82f6;
text-decoration:none;
}

.toptext{
font-size:14px;
color:#6b7a99;
margin-bottom:5px;
}

/* 🔥 TOGGLE */
.toggle {
  display: flex;
  margin: 10px 0;
}

.toggle button {
  flex: 1;
  padding: 12px;
  border: none;
  cursor: pointer;
  background: #334155;
  color: white;
}

.toggle button.active {
  background: #3b82f6;
}

</style>
</head>

<body>


<div class="container">

<h1>Position Size Calculator - With Basic and Advanced Version</h1>

<!-- TOGGLE -->
<div class="toggle">
  <button id="basicBtn" class="active" onclick="switchMode('basic')">Basic</button>
  <button id="advBtn" onclick="switchMode('advanced')">Advanced</button>
</div>

<input id="balance" placeholder="Account Balance ($)">
<input id="risk" placeholder="Risk % per trade">
<input id="entry" placeholder="Entry Price">
<input id="stop" placeholder="Stop Loss Price">

<!-- ADVANCED INPUTS -->
<div id="advancedInputs" style="display:none;">
<input id="spread" placeholder="Spread (pips)">
<input id="slippage" placeholder="Slippage (pips)">
<input id="pipValue" placeholder="Pip Value (default = 1)">
</div>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<canvas id="myChart"></canvas>

</div>

<script>

let chart;
let mode = "basic";

/* MODE SWITCH */
function switchMode(m){
  mode = m;

  document.getElementById("advancedInputs").style.display =
    m === "advanced" ? "block" : "none";

  document.getElementById("basicBtn").classList.toggle("active", m==="basic");
  document.getElementById("advBtn").classList.toggle("active", m==="advanced");
}

/* FORMAT */
function formatNumber(num){
  return Number.isInteger(num)
    ? num.toString()
    : num.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 4
      });
}

/* CALCULATE */
function calculate(){

let balance = parseFloat(document.getElementById("balance").value);
let riskPercent = parseFloat(document.getElementById("risk").value);
let entry = parseFloat(document.getElementById("entry").value);
let stop = parseFloat(document.getElementById("stop").value);

if(!balance || !riskPercent || !entry || !stop){
  alert("Fill all fields");
  return;
}

let riskAmount = balance * (riskPercent / 100);
let stopDistance = Math.abs(entry - stop);

if(stopDistance === 0){
  alert("Stop cannot equal entry");
  return;
}

/* ADVANCED */
if(mode === "advanced"){
  let spread = parseFloat(document.getElementById("spread").value) || 0;
  let slippage = parseFloat(document.getElementById("slippage").value) || 0;

  stopDistance += (spread + slippage);
}

/* pip value */
let pipValue = parseFloat(document.getElementById("pipValue").value) || 1;

/* FINAL CALC */
let positionSize = riskAmount / (stopDistance * pipValue);
let positionValue = positionSize * entry;

/* RESULT */
document.getElementById("result").innerHTML =
"Position Size: " + formatNumber(positionSize) + " units" +
"<br>Position Value: $" + positionValue.toFixed(2) +
"<br>Risk Amount: $" + riskAmount.toFixed(2);

/* CHART */
drawChart(riskAmount, positionValue);
}

/* CHART */
function drawChart(riskAmount, positionValue){

let ctx = document.getElementById("myChart");

if(chart){
  chart.destroy();
}

chart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ["Risk Amount", "Position Value"],
    datasets: [{
      label: "Trade Overview",
      data: [riskAmount, positionValue],
      backgroundColor: ["#ef4444", "#22c55e"]
    }]
  }
});
}

</script>

</body>
</html>
